<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    .sidebar {
      width: 70px;
      background: #202123;
      color: white;
      transition: width 0.3s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .sidebar.expanded {
      width: 250px;
    }

    .sidebar button {
      background: #343541;
      border: none;
      color: white;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 5px;
      text-align: left;
    }

    .sidebar button:hover {
      background: #444654;
    }

    .chats {
      margin-top: 10px;
      display: none;
    }

    .sidebar.expanded .chats {
      display: block;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 60px;
      background: white;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid #ddd;
    }

    .topbar button {
      margin-left: 10px;
      padding: 8px 15px;
      border: none;
      background: #10a37f;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .topbar button:hover {
      background: #0e8c6d;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px 18px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #10a37f;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e5e5e5;
      align-self: flex-start;
    }

    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: center;
    }

    .input-area input {
      flex: 1;
      max-width: 600px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .input-area button {
      margin-left: 10px;
      padding: 10px 20px;
      background: #10a37f;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button onclick="toggleSidebar()">📜</button>
    <button onclick="newChat()">➕</button>
    <div class="chats">
      <button>Sohbet 1</button>
      <button>Sohbet 2</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button>Login</button>
      <button>Register</button>
    </div>

    <div id="chatArea" class="chat-area">
      <div class="message bot">Merhaba! Sana nasıl yardımcı olabilirim?</div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Mesaj yaz...">
      <button onclick="sendMessage()">Gönder</button>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("expanded");
    }

    function newChat() {
      const chatArea = document.getElementById("chatArea");
      chatArea.innerHTML = '<div class="message bot">New chat started! How can I help you?</div>';
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const message = input.value.trim();

      if (!message) return;

      appendMessage(message, 'user');
      input.value = "";

      try {
        const response = await fetch('/chat-api/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({ message: message })
        });

        const data = await response.json();
        appendMessage(data.reply, 'bot');
      } catch (error) {
        appendMessage("Hata: Sunucuya bağlanılamadı.", 'bot');
      }
    }

    function appendMessage(text, sender) {
      const chatArea = document.getElementById("chatArea");
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.innerText = text;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    document.getElementById("messageInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
