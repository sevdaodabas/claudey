<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #202123;
      color: white;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .sidebar-header {
      margin-bottom: 15px;
    }

    .sidebar-header button {
      width: 100%;
      background: #343541;
      border: 1px solid #565869;
      color: white;
      padding: 12px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
    }

    .sidebar-header button:hover {
      background: #444654;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 10px;
      margin-bottom: 4px;
      border-radius: 5px;
      cursor: pointer;
      color: #ddd;
      font-size: 14px;
    }

    .chat-item:hover {
      background: #343541;
    }

    .chat-item.active {
      background: #343541;
    }

    .chat-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-item-title input {
      background: transparent;
      border: 1px solid #565869;
      color: white;
      padding: 2px 5px;
      border-radius: 3px;
      width: 100%;
      font-size: 14px;
      outline: none;
    }

    .chat-item .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 18px;
      padding: 0 5px;
      line-height: 1;
    }

    .chat-item:hover .delete-btn {
      opacity: 1;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 60px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid #ddd;
    }

    .app-title {
      font-weight: bold;
      font-size: 18px;
      color: #202123;
    }

    .topbar-buttons button {
      margin-left: 10px;
      padding: 8px 15px;
      border: none;
      background: #10a37f;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .topbar-buttons button:hover {
      background: #0e8c6d;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px 18px;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 15px;
    }

    .user {
      background: #10a37f;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e5e5e5;
      align-self: flex-start;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #e5e5e5;
      padding: 12px 18px;
      border-radius: 15px;
      margin-bottom: 15px;
      gap: 5px;
      align-items: center;
    }

    .typing-indicator.active {
      display: flex;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input */
    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: center;
    }

    .input-area input {
      flex: 1;
      max-width: 700px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      outline: none;
    }

    .input-area input:focus {
      border-color: #10a37f;
    }

    .input-area button {
      margin-left: 10px;
      padding: 12px 24px;
      background: #10a37f;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .input-area button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <button onclick="createNewChat()">+ Yeni Sohbet</button>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="app-title">Claudey</span>
      <div class="topbar-buttons">
        <button>Giriş Yap</button>
        <button>Kayıt Ol</button>
      </div>
    </div>

    <div id="chatArea" class="chat-area">
      <div class="message bot">Merhaba! Ben Claudey, Acıbadem Üniversitesi yapay zeka asistanıyım. Size nasıl yardımcı olabilirim?</div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Gönder</button>
    </div>
  </div>

  <script>
    let conversations = JSON.parse(localStorage.getItem('claudey_chats') || '[]');
    let currentChatId = null;
    let isSending = false;

    // Init
    if (conversations.length === 0) {
      createNewChat();
    } else {
      renderSidebar();
      loadChat(conversations[0].id);
    }

    function generateId() {
      return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    }

    function createNewChat() {
      const chat = {
        id: generateId(),
        title: 'Yeni Sohbet',
        messages: []
      };
      conversations.unshift(chat);
      saveConversations();
      renderSidebar();
      loadChat(chat.id);
    }

    function loadChat(chatId) {
      currentChatId = chatId;
      const chat = conversations.find(c => c.id === chatId);
      if (!chat) return;

      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = '';

      // Welcome message
      const welcome = document.createElement('div');
      welcome.className = 'message bot';
      welcome.innerText = 'Merhaba! Ben Claudey, Acıbadem Üniversitesi yapay zeka asistanıyım. Size nasıl yardımcı olabilirim?';
      chatArea.appendChild(welcome);

      // Load saved messages
      chat.messages.forEach(msg => {
        appendMessage(msg.text, msg.sender, false);
      });

      // Add typing indicator
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.id = 'typingIndicator';
      indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      chatArea.appendChild(indicator);

      renderSidebar();
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function saveConversations() {
      localStorage.setItem('claudey_chats', JSON.stringify(conversations));
    }

    function renderSidebar() {
      const list = document.getElementById('chatList');
      list.innerHTML = '';

      conversations.forEach(chat => {
        const item = document.createElement('div');
        item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');

        const titleSpan = document.createElement('span');
        titleSpan.className = 'chat-item-title';
        titleSpan.textContent = chat.title;
        titleSpan.ondblclick = function(e) {
          e.stopPropagation();
          startEditTitle(chat.id, titleSpan);
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '&times;';
        deleteBtn.onclick = function(e) {
          e.stopPropagation();
          deleteChat(chat.id);
        };

        item.appendChild(titleSpan);
        item.appendChild(deleteBtn);
        item.onclick = function() { loadChat(chat.id); };
        list.appendChild(item);
      });
    }

    function startEditTitle(chatId, element) {
      const chat = conversations.find(c => c.id === chatId);
      if (!chat) return;

      const input = document.createElement('input');
      input.value = chat.title;
      input.onclick = function(e) { e.stopPropagation(); };

      input.onblur = function() { finishEdit(chatId, input); };
      input.onkeydown = function(e) {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { renderSidebar(); }
      };

      element.innerHTML = '';
      element.appendChild(input);
      input.focus();
      input.select();
    }

    function finishEdit(chatId, input) {
      const chat = conversations.find(c => c.id === chatId);
      if (chat && input.value.trim()) {
        chat.title = input.value.trim();
        saveConversations();
      }
      renderSidebar();
    }

    function deleteChat(chatId) {
      conversations = conversations.filter(c => c.id !== chatId);
      if (conversations.length === 0) {
        createNewChat();
      } else if (currentChatId === chatId) {
        loadChat(conversations[0].id);
      }
      saveConversations();
      renderSidebar();
    }

    async function sendMessage() {
      if (isSending) return;
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      const chat = conversations.find(c => c.id === currentChatId);
      if (!chat) return;

      isSending = true;
      document.getElementById('sendBtn').disabled = true;

      appendMessage(message, 'user');
      chat.messages.push({ text: message, sender: 'user' });
      saveConversations();
      input.value = '';

      const isFirstMessage = chat.messages.length === 1;

      // Show typing indicator
      document.getElementById('typingIndicator').classList.add('active');
      scrollToBottom();

      try {
        const response = await fetch('/chat-api/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message })
        });
        const data = await response.json();

        document.getElementById('typingIndicator').classList.remove('active');
        appendMessage(data.reply, 'bot');
        chat.messages.push({ text: data.reply, sender: 'bot' });
        saveConversations();

        if (isFirstMessage) {
          generateChatTitle(chat.id, message);
        }
      } catch (error) {
        document.getElementById('typingIndicator').classList.remove('active');
        appendMessage('Hata: Sunucuya bağlanılamadı.', 'bot');
      }

      isSending = false;
      document.getElementById('sendBtn').disabled = false;
    }

    async function generateChatTitle(chatId, question) {
      try {
        const response = await fetch('/generate-title/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question })
        });
        const data = await response.json();
        const chat = conversations.find(c => c.id === chatId);
        if (chat && data.title) {
          chat.title = data.title;
          saveConversations();
          renderSidebar();
        }
      } catch (e) {
        // Hata durumunda varsayilan ismi koru
      }
    }

    function appendMessage(text, sender, scroll) {
      if (scroll === undefined) scroll = true;
      const chatArea = document.getElementById('chatArea');
      const indicator = document.getElementById('typingIndicator');
      const msg = document.createElement('div');
      msg.className = 'message ' + sender;
      msg.innerText = text;
      chatArea.insertBefore(msg, indicator);
      if (scroll) scrollToBottom();
    }

    function scrollToBottom() {
      const chatArea = document.getElementById('chatArea');
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    document.getElementById('messageInput').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
