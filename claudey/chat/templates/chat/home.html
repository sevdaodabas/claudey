<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f5f5f5;
    }

    /* Sidebar */
    .sidebar {
      width: 70px;
      background: #202123;
      color: white;
      transition: width 0.3s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .sidebar.expanded {
      width: 250px;
    }

    .sidebar button {
      background: #343541;
      border: none;
      color: white;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border-radius: 5px;
      text-align: left;
    }

    .sidebar button:hover {
      background: #444654;
    }

    .chats {
      margin-top: 10px;
      display: none;
    }

    .sidebar.expanded .chats {
      display: block;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 60px;
      background: white;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid #ddd;
    }

    .topbar button {
      margin-left: 10px;
      padding: 8px 15px;
      border: none;
      background: #10a37f;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .topbar button:hover {
      background: #0e8c6d;
    }

    /* Chat container ortalama */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Dikey ortalama */
      align-items: center;     /* Yatay ortalama */
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      max-width: 60%;
      text-align: center;
    }

    .user {
      background: #10a37f;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e5e5e5;
    }

    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: center; /* Ortala */
    }

    .input-area input {
      flex: 1;
      max-width: 400px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .input-area button {
      margin-left: 10px;
      padding: 10px 20px;
      background: #10a37f;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button onclick="newChat()">➕</button>
    <button onclick="toggleSidebar()">📜</button>

    <div class="chats">
      <button>Sohbet 1</button>
      <button>Sohbet 2</button>
      <button>Sohbet 3</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button>Login</button>
      <button>Register</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="message bot">Merhaba! Sana nasıl yardımcı olabilirim?</div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Mesaj yaz...">
      <button onclick="sendMessage()">Gönder</button>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("expanded");
    }

    function newChat() {
      const chatArea = document.getElementById("chatArea");
      chatArea.innerHTML = '<div class="message bot">Yeni sohbet başladı! Sana nasıl yardımcı olabilirim?</div>';
      chatArea.style.justifyContent = "center"; // Yeni sohbet ortada
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatArea = document.getElementById("chatArea");

      if (input.value.trim() === "") return;

      // Mesajı ekle
      const msg = document.createElement("div");
      msg.className = "message user";
      msg.innerText = input.value;
      chatArea.appendChild(msg);

      // Inputu temizle
      input.value = "";

      // Dikey ortalamayı kaldır ve en alta kaydır
      chatArea.style.justifyContent = "flex-start";
      chatArea.scrollTop = chatArea.scrollHeight;
    }
  </script>

</body>
</html>
